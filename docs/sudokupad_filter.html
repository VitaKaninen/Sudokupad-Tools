<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SudokuPad Index Filter</title>
<style>
  :root{
    --bg:#f4f5f7; --panel:#ffffff; --ink:#1c2127; --muted:#6b7280;
    --line:#e2e5ea; --line2:#d3d8e0;
    --accent:#2f6fed; --accent-ink:#ffffff; --accent-soft:#e7efff;
    --chip:#eef1f5; --chip-ink:#3a414b; --chip-on:#1c2127; --chip-on-ink:#fff;
    --disabled:#aab1bc; --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.08);
    --mono:"SFMono-Regular",ui-monospace,"Cascadia Code","Consolas",monospace;
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--ui);
    font-size:15px;line-height:1.45;-webkit-text-size-adjust:100%}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 18px 64px}

  header.top{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .glyph{width:34px;height:34px;flex:0 0 auto;display:grid;
    grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:2px}
  .glyph i{background:var(--line2);border-radius:1px}
  .glyph i.on{background:var(--accent)}
  h1{font-size:19px;font-weight:650;margin:0;letter-spacing:-.01em}
  .sub{font-size:12.5px;color:var(--muted);margin-top:1px;font-family:var(--mono)}

  .panel{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow);padding:16px 16px 18px;margin-bottom:18px}
  .panel-head{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:12px}
  .panel-head h2{font-size:12px;font-weight:650;text-transform:uppercase;letter-spacing:.07em;
    color:var(--muted);margin:0}
  .clear{font:inherit;font-size:12.5px;color:var(--accent);background:none;border:none;
    cursor:pointer;padding:4px 6px;border-radius:6px}
  .clear:hover{background:var(--accent-soft)}
  .clear[hidden]{display:none}

  .grp-label{font-size:11px;font-weight:650;letter-spacing:.06em;text-transform:uppercase;
    color:var(--muted);margin:14px 0 8px}
  .grp-label:first-child{margin-top:2px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font:inherit;font-size:13.5px;display:inline-flex;align-items:center;gap:7px;
    padding:6px 11px;border:1px solid var(--line2);background:var(--chip);color:var(--chip-ink);
    border-radius:999px;cursor:pointer;transition:background .12s,border-color .12s,color .12s,opacity .12s}
  .chip .n{font-family:var(--mono);font-size:11.5px;color:var(--muted);
    background:#fff;border:1px solid var(--line);border-radius:999px;padding:0 6px;min-width:20px;text-align:center}
  .chip:hover:not(:disabled):not(.on){border-color:var(--accent);color:var(--ink)}
  .chip.on{background:var(--chip-on);color:var(--chip-on-ink);border-color:var(--chip-on)}
  .chip.on .n{background:rgba(255,255,255,.16);border-color:transparent;color:#fff}
  .chip:disabled{opacity:.4;cursor:not-allowed}
  .chip:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .results-head{display:flex;align-items:baseline;gap:10px;margin:4px 2px 12px}
  .results-head .count{font-family:var(--mono);font-size:13px;color:var(--ink)}
  .results-head .lbl{font-size:12.5px;color:var(--muted)}

  ul.list{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:1px;
    border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--line)}
  li.row{background:var(--panel);padding:11px 14px}
  li.row:hover{background:#fafbfc}
  .row-title{font-size:14.5px;font-weight:550;text-decoration:none;color:var(--accent);
    word-break:break-word}
  .row-title:hover{text-decoration:underline}
  .row-title.nolink{color:var(--muted);font-weight:500;cursor:default}
  .nolink-tag{font-family:var(--mono);font-size:10.5px;color:var(--muted);border:1px solid var(--line2);
    border-radius:4px;padding:0 4px;margin-left:7px;vertical-align:1px}
  .badges{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
  .badge{font-size:11px;font-family:var(--mono);letter-spacing:.01em;color:var(--chip-ink);
    background:var(--chip);border:1px solid var(--line);border-radius:5px;padding:1px 6px}
  .badge.match{background:var(--accent-soft);border-color:#bcd3fb;color:#174ea6;font-weight:600}
  .badge.size{background:#fff4e5;border-color:#f3d9ad;color:#9a5b00}
  .badge.size.match{background:#ffe7c2;border-color:#e9b870;color:#7a4600}

  .empty{background:var(--panel);border:1px dashed var(--line2);border-radius:12px;
    padding:34px 20px;text-align:center;color:var(--muted)}
  .empty strong{display:block;color:var(--ink);font-weight:600;margin-bottom:4px;font-size:15px}

  .foot{margin-top:22px;font-size:12px;color:var(--muted);font-family:var(--mono);text-align:center}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  @media (max-width:560px){.wrap{padding:16px 12px 56px}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="glyph" aria-hidden="true">
      <i></i><i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i><i></i><i class="on"></i><i></i>
    </div>
    <div>
      <h1>SudokuPad Index Filter</h1>
      <div class="sub" id="sub"></div>
    </div>
  </header>

  <section class="panel">
    <div class="panel-head">
      <h2>Filters &nbsp;<span style="font-weight:500;text-transform:none;letter-spacing:0;color:var(--muted)">— results must match every selected filter</span></h2>
      <button class="clear" id="clear" hidden>Clear all</button>
    </div>
    <div class="grp-label">Constraints</div>
    <div class="chips" id="traitChips"></div>
    <div class="grp-label">Grid size <span style="font-weight:500;text-transform:none;letter-spacing:0;color:var(--muted)">(9×9 assumed; only off-size shown)</span></div>
    <div class="chips" id="sizeChips"></div>
  </section>

  <div class="results-head">
    <span class="count" id="rcount"></span>
    <span class="lbl" id="rlbl"></span>
  </div>
  <div id="results"></div>

  <div class="foot">1,890 puzzles indexed · titles open SudokuPad in a new tab</div>
</div>

const sizeSet = new Set(sizeKeys);
const selected = new Set();

const elTrait = document.getElementById('traitChips');
const elSize  = document.getElementById('sizeChips');
const elClear = document.getElementById('clear');
const elResults = document.getElementById('results');
const elRcount = document.getElementById('rcount');
const elRlbl = document.getElementById('rlbl');
document.getElementById('sub').textContent = puzzles.length + ' puzzles · ' + (traitKeys.length+sizeKeys.length) + ' filters';

function makeChip(key){
  const b=document.createElement('button');
  b.className='chip'; b.dataset.key=key; b.type='button';
  b.setAttribute('aria-pressed','false');
  b.innerHTML='<span>'+labels[key]+'</span><span class="n"></span>';
  b.addEventListener('click',()=>{ if(b.disabled) return;
    selected.has(key)?selected.delete(key):selected.add(key); render(); });
  return b;
}
traitKeys.forEach(k=>elTrait.appendChild(makeChip(k)));
sizeKeys.forEach(k=>elSize.appendChild(makeChip(k)));
const chipEls={}; document.querySelectorAll('.chip').forEach(c=>chipEls[c.dataset.key]=c);

function matchesSelection(p){ for(const k of selected){ if(!p.f.includes(k)) return false; } return true; }

function render(){
  const filtered = selected.size? puzzles.filter(matchesSelection) : [];
  const base = selected.size? filtered : puzzles; // counts shown relative to current result set

  // update chip counts + disabled state
  for(const key in chipEls){
    const c=chipEls[key], on=selected.has(key);
    let n;
    if(selected.size===0){ n=puzzles.reduce((a,p)=>a+(p.f.includes(key)?1:0),0); }
    else { n=filtered.reduce((a,p)=>a+(p.f.includes(key)?1:0),0); }
    c.querySelector('.n').textContent=n;
    c.classList.toggle('on',on);
    c.setAttribute('aria-pressed',on?'true':'false');
    c.disabled = (!on && n===0);
  }
  elClear.hidden = selected.size===0;

  // results
  if(selected.size===0){
    elRcount.textContent=''; elRlbl.textContent='';
    elResults.innerHTML='<div class="empty"><strong>No filters selected</strong>Pick one or more filters above to list matching puzzles.</div>';
    return;
  }
  elRcount.textContent = filtered.length.toLocaleString();
  elRlbl.textContent = (filtered.length===1?'puzzle matches':'puzzles match')+' all selected filters';
  if(filtered.length===0){
    elResults.innerHTML='<div class="empty"><strong>No puzzles match all of those filters</strong>Remove a filter to widen the results.</div>';
    return;
  }
  const ul=document.createElement('ul'); ul.className='list';
  for(const p of filtered){
    const li=document.createElement('li'); li.className='row';
    let titleHtml;
    if(p.u){ titleHtml='<a class="row-title" href="'+p.u+'" target="_blank" rel="noopener noreferrer">'+esc(p.t)+'</a>'; }
    else { titleHtml='<span class="row-title nolink">'+esc(p.t)+'</span><span class="nolink-tag">no link</span>'; }
    // badges: all features of the puzzle, selected ones highlighted, size styled
    const badges=p.f.slice().sort((a,b)=>labels[a].localeCompare(labels[b]))
      .map(k=>{ const sz=sizeSet.has(k), on=selected.has(k);
        return '<span class="badge'+(sz?' size':'')+(on?' match':'')+'">'+labels[k]+'</span>'; }).join('');
    li.innerHTML=titleHtml+'<div class="badges">'+badges+'</div>';
    ul.appendChild(li);
  }
  elResults.innerHTML=''; elResults.appendChild(ul);
}
function esc(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
elClear.addEventListener('click',()=>{selected.clear();render();});
render();
</script>
</body>
</html>
